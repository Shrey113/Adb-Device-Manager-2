name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Upload Pages Artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete Old GitHub Pages Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            // Sort by creation date (newest first)
            const pagesArtifacts = artifacts
              .filter(artifact => artifact.name === "github-pages")
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Keep the latest one, delete the rest
            const toDelete = pagesArtifacts.slice(1);

            for (const artifact of toDelete) {
              console.log(`Deleting artifact ${artifact.id} (created: ${artifact.created_at})`);
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              } catch (error) {
                console.error(`Failed to delete artifact ${artifact.id}:`, error.message);
              }
            }

            console.log(`Deleted ${toDelete.length} old artifact(s). Kept 1 latest artifact.`);
